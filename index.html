<html lang="en">

<meta charset="UTF-8">

<title>1000 Daily Vocabulary — Jasam's Master Guide</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap');

:root {
  --bg:#06060f; --surface:#0d0d1a; --card:rgba(255,255,255,0.04);
  --gold:#ffc400; --txt:#dde1f0; --muted:rgba(221,225,240,0.42);
  --line:rgba(255,255,255,0.07);
  --basic:#4ade80; --basicg:rgba(74,222,128,0.1); --basicb:rgba(74,222,128,0.25);
  --inter:#60a5fa;  --interg:rgba(96,165,250,0.1);  --interb:rgba(96,165,250,0.25);
  --adv:#f472b6;   --advg:rgba(244,114,182,0.1);   --advb:rgba(244,114,182,0.25);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}

/* orbs */
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.28;animation:drift 20s ease-in-out infinite alternate}
.o1{width:600px;height:600px;background:#ff5f2e;top:-15%;left:-10%;animation-delay:0s}
.o2{width:450px;height:450px;background:#00d4ff;bottom:-10%;right:-5%;animation-delay:-7s}
.o3{width:350px;height:350px;background:#00ff88;top:45%;left:42%;animation-delay:-14s;opacity:0.14}
.o4{width:280px;height:280px;background:#bf7bff;top:15%;right:25%;animation-delay:-3s;opacity:0.18}
@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(50px,35px) scale(1.1)}}

/* HEADER */
header{
  position:relative;z-index:10;padding:44px 24px 28px;
  text-align:center;border-bottom:1px solid var(--line);
  background:rgba(6,6,15,0.88);backdrop-filter:blur(18px);
}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,196,0,0.1);border:1px solid rgba(255,196,0,0.25);
  color:var(--gold);font-size:0.68rem;letter-spacing:3px;text-transform:uppercase;
  padding:5px 20px;border-radius:100px;margin-bottom:16px;
}
.eyebrow::before,.eyebrow::after{content:'◆';font-size:0.5rem;opacity:0.6}
h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2.8rem,9vw,6rem);
  letter-spacing:4px;line-height:1;margin-bottom:8px;
  background:linear-gradient(90deg,#ff5f2e,#ffc400,#00d4ff,#00ff88,#bf7bff,#ff5f2e);
  background-size:400%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:hue 8s linear infinite;
}
@keyframes hue{0%{background-position:0%}100%{background-position:400%}}
.sub{color:var(--muted);font-size:0.85rem;margin-bottom:8px}
.totals{
  display:inline-flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;
}
.tp{
  background:rgba(255,255,255,0.05);border:1px solid var(--line);
  border-radius:30px;padding:4px 14px;font-size:0.72rem;font-weight:600;
}
.tp.b{color:var(--basic);border-color:var(--basicb)}
.tp.i{color:var(--inter);border-color:var(--interb)}
.tp.a{color:var(--adv);border-color:var(--advb)}
.tp.t{color:var(--gold);border-color:rgba(255,196,0,0.3)}

/* CONTROLS */
.controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
#si{
  background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);
  border-radius:12px;padding:10px 20px;color:var(--txt);
  font-family:'Outfit',sans-serif;font-size:0.9rem;width:260px;outline:none;transition:all .2s;
}
#si:focus{border-color:var(--gold);background:rgba(255,196,0,0.05);box-shadow:0 0 22px rgba(255,196,0,0.12)}
.fb{
  font-family:'Outfit',sans-serif;font-size:0.78rem;font-weight:600;
  padding:10px 18px;border-radius:12px;cursor:pointer;border:1.5px solid var(--line);
  color:var(--muted);background:rgba(255,255,255,0.04);transition:all .18s;
}
.fb.on,.fb:hover{color:var(--gold);border-color:rgba(255,196,0,0.4);background:rgba(255,196,0,0.08)}
.fb.on.basic,.fb.basic:hover{color:var(--basic);border-color:var(--basicb);background:var(--basicg)}
.fb.on.inter,.fb.inter:hover{color:var(--inter);border-color:var(--interb);background:var(--interg)}
.fb.on.adv,.fb.adv:hover{color:var(--adv);border-color:var(--advb);background:var(--advg)}

/* STAT BAR */
.statbar{
  text-align:center;padding:10px;
  color:var(--muted);font-size:0.78rem;position:relative;z-index:5;
}
.statbar strong{color:var(--gold)}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(175px,1fr));
  gap:8px;padding:10px 14px 60px;
  max-width:1440px;margin:0 auto;
  position:relative;z-index:5;
}
.wc{
  background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:13px 15px 11px;
  transition:transform .15s,box-shadow .15s,border-color .15s,background .15s;
  position:relative;overflow:hidden;cursor:default;
}
.wc::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2.5px;
  transform:scaleX(0);transform-origin:left;transition:transform .22s;
}
.wc.basic::after{background:var(--basic)}
.wc.inter::after{background:var(--inter)}
.wc.adv::after{background:var(--adv)}

.wc:hover{transform:translateY(-3px);background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.14)}
.wc:hover::after{transform:scaleX(1)}
.wc.basic:hover{box-shadow:0 6px 22px rgba(74,222,128,0.13)}
.wc.inter:hover{box-shadow:0 6px 22px rgba(96,165,250,0.13)}
.wc.adv:hover{box-shadow:0 6px 22px rgba(244,114,182,0.13)}

.wn{font-size:0.58rem;color:rgba(255,255,255,0.18);margin-bottom:4px}
.we{font-weight:700;font-size:0.95rem;margin-bottom:2px;color:var(--txt)}
.wp{font-size:0.78rem;color:var(--gold);margin-bottom:2px;opacity:.9}
.wm{font-size:0.76rem;color:var(--muted)}
.badge{
  display:inline-block;font-size:0.58rem;padding:2px 8px;
  border-radius:20px;margin-top:6px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
}
.badge.basic{background:rgba(74,222,128,0.1);color:var(--basic);border:1px solid rgba(74,222,128,0.25)}
.badge.inter{background:rgba(96,165,250,0.1);color:var(--inter);border:1px solid rgba(96,165,250,0.25)}
.badge.adv{background:rgba(244,114,182,0.1);color:var(--adv);border:1px solid rgba(244,114,182,0.25)}

/* highlight on search */
.wc.hl{border-color:var(--gold)!important;background:rgba(255,196,0,0.06)!important}
.wc.dim{opacity:.1;pointer-events:none}

.nores{grid-column:1/-1;text-align:center;color:var(--muted);padding:60px;font-size:.95rem;display:none}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#08081a}
::-webkit-scrollbar-thumb{background:#1e1e38;border-radius:3px}

@media(max-width:480px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:6px;padding:8px 8px 60px}
}
</style>
</head>

// deduplicate by lowercase english
const seen = new Set();
const DATA = W.filter(w => {
  const k = w[0].toLowerCase();
  if(seen.has(k)) return false;
  seen.add(k); return true;
});

// count levels
const bC = DATA.filter(w=>w[3]==='basic').length;
const iC = DATA.filter(w=>w[3]==='inter').length;
const aC = DATA.filter(w=>w[3]==='adv').length;
document.getElementById('totalAll').textContent = DATA.length;
document.getElementById('totalB').textContent = bC;
document.getElementById('totalI').textContent = iC;
document.getElementById('totalA').textContent = aC;
document.getElementById('cnt').textContent = DATA.length;

let activeL = 'all';

function render(list){
  const g = document.getElementById('grid');
  const nr = document.getElementById('nores');
  // remove old cards
  g.querySelectorAll('.wc').forEach(c=>c.remove());
  nr.style.display = list.length===0 ? 'block' : 'none';
  document.getElementById('cnt').textContent = list.length;
  list.forEach((w,i)=>{
    const c = document.createElement('div');
    c.className = `wc ${w[3]}`;
    c.innerHTML = `
      <div class="wn">#${String(i+1).padStart(4,'0')}</div>
      <div class="we">${w[0]}</div>
      <div class="wp">${w[1]}</div>
      <div class="wm">${w[2]}</div>
      <span class="badge ${w[3]}">${w[3]==='basic'?'🟢 Basic':w[3]==='inter'?'🔵 Inter':'🔴 Adv'}</span>
    `;
    g.appendChild(c);
  });
}

function doFilter(){
  const q = document.getElementById('si').value.toLowerCase().trim();
  let list = activeL==='all' ? DATA : DATA.filter(w=>w[3]===activeL);
  if(q) list = list.filter(w=>w[0].toLowerCase().includes(q)||w[1].includes(q)||w[2].includes(q));
  render(list);
}

function setL(l, btn){
  activeL = l;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  doFilter();
}

render(DATA);
</script>
